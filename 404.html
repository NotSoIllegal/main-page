<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotSoIllegal - 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #eee;
            text-align: center;
        }

        .container {
            max-width: 400px;
        }

        .error-code {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .digit {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 700;
            line-height: 1;
        }

        .error-code img {
            max-width: 100px;
            height: auto;
            border-radius: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .error-code img {
                max-width: 50px;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">
            <span class="digit">4</span>
            <div class="image-container">
                <img src="https://raw.githubusercontent.com/NotSoIllegal/main-page/refs/heads/main/jestal_rolling.gif" alt="Jesta rolling gif">
            </div>
            <span class="digit">4</span>
        </div>
        <p>Page not found...</p>
    </div>
    <script>
        document.querySelectorAll('.image-container img').forEach(function(img) {
            // Replace image with digit, if browser can't download funny jesta rolling gif for some reason.
            img.onerror = function() {
                var container = this.parentElement;
                var span = document.createElement('span');
                span.className = 'digit';
                span.textContent = '0';
                container.parentNode.replaceChild(span, container);
            };
        });
    </script>
</body>
</html>
