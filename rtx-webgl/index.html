<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL shit</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #333;
            background: #000;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .controls {
            margin-top: 15px;
            color: #fff;
        }
        .controls input {
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas" width="800" height="600"></canvas>
        <div class="controls">
            <label>Cam thing: </label>
            <input type="range" id="cameraX" min="-10" max="10" step="0.1" value="0">
            <input type="range" id="cameraY" min="-10" max="10" step="0.1" value="0">
            <input type="range" id="cameraZ" min="5" max="20" step="0.1" value="10">
        </div>
    </div>

    <script src="raytracer.js"></script>
</body>
</html>
